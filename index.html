<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Coasts</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./style.css">
  </head>
    
  <body>
  <div class="svg-container">
  <svg class="image" viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg">
    <rect class="background" width="100%" height="100%"/>
    <g class="lines-backgrounds"></g>
    <g class="lines"></g>
    <g class="cells"></g>
    <rect class="border" x="0" y="0" width="1000" height="1500" fill="none"/>
  </svg>
</div>

<div class="buttons-container top">
  <p class="button regenerate">regenerate</p>
  <p class="button tide">run tide</p>
  <p class="button reverse-tide">reverse tide</p>
</div>

<div class="buttons-container bottom">
  <p><span class="button download-svg">SVG⬇</span> <span class="button download-png">PNG⬇</span></p>
</div>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script><script  src="./script.js"></script>

  </body>
  
</html>
